name: Release

# Triggered by pushing a tag matching `v*` (e.g. `v3.0.0`, `v3.0.1rc1`,
# `v3.0.0.post1`). PEP 440 pre-releases are supported. The tagged commit
# must already be green on the main CI workflow — release workflow does
# not re-run tests, only builds + publishes.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python3 -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python3 -m build

      - name: Verify metadata
        run: python3 -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/uxon
    permissions:
      id-token: write   # OIDC for Trusted Publisher; no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        # PEP 740 attestations are generated and uploaded automatically
        # since v1.11.0; no extra signing step required.

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
