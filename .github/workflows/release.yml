name: Release

# Triggered by pushing a tag matching `v*` (e.g. `v3.0.0`, `v3.0.1rc1`,
# `v3.0.0.post1`). PEP 440 pre-releases are supported. The full check
# suite (tests, lint, typecheck, secrets scan) runs against the tagged
# commit before any artifact is built or published — a red commit can
# never be released. Tests run on a single Python version here for
# speed; CI on `main` covers the full matrix. To run the matrix on a
# release too, pass `python-versions` to the `checks` job below.

on:
  push:
    tags:
      - "v*"

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml
    with:
      python-versions: '["3.11"]'

  build:
    name: Build sdist + wheel
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python3 -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python3 -m build

      - name: Verify metadata
        run: python3 -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/uxon
    permissions:
      id-token: write   # OIDC for Trusted Publisher; no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        # PEP 740 attestations are generated and uploaded automatically
        # since v1.11.0; no extra signing step required.

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # need full tag history to compute the compare link to the
          # previous release
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build release notes from CHANGELOG.md
        env:
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF#v}"
          # Previous v* tag, by version sort. Empty on first release —
          # the compare link is then omitted.
          PREV=$(git tag -l 'v*' --sort=-v:refname \
            | awk -v cur="$REF" 'cur==$0{getline; print; exit}')
          {
            echo '## Install / upgrade'
            echo
            echo '```bash'
            echo 'uv tool install --upgrade uxon          # recommended'
            echo 'pipx upgrade uxon                       # alt'
            echo 'pip install --upgrade --user uxon       # alt'
            echo '```'
            echo
            echo '## What changed'
            echo
            # Extract the section for this version: everything between
            # `## [VERSION]` and the next `## [` heading.
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { p = 1; next }
              p && /^## \[/ { exit }
              p { print }
            ' CHANGELOG.md
            echo
            echo "**Full changelog:** [\`CHANGELOG.md\`](https://github.com/${REPO}/blob/${REF}/CHANGELOG.md)"
            if [ -n "$PREV" ]; then
              echo
              echo "**Compare:** [\`${PREV}...${REF}\`](https://github.com/${REPO}/compare/${PREV}...${REF})"
            fi
          } > release-notes.md
          # Fail loudly if the CHANGELOG didn't have an entry for this
          # version — better than silently shipping a notes file that
          # only contains the install snippet.
          if ! grep -q '^### \|^- ' release-notes.md; then
            echo "ERROR: no CHANGELOG entry found for version $VERSION" >&2
            echo "       expected a '## [$VERSION]' heading in CHANGELOG.md" >&2
            exit 1
          fi
          echo '--- generated release notes ---'
          cat release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
