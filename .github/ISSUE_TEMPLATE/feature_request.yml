name: Feature request
description: Suggest a change to uxon's behaviour or interface.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow are you trying to support? What does uxon do today that gets in the way, or what is missing entirely?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Concrete change. CLI flag, TUI binding, config key, behaviour.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you try first? Why didn't it work?
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: Would this break existing config, session names, or commands?
    validations:
      required: true
