# uxon host config. Full guide: docs/index.md
# (https://github.com/vzd3v/uxon/blob/main/docs/index.md).
#
# ── Recommended workflow ──────────────────────────────────────────
# Pair each shell user with a low-privilege OS account that owns
# the agent's runtime — e.g. `vz` (you) + `vz_agent`. The agent
# runs as `<user>_agent` via `sudo -iu`. With `--dsp` ("yolo"), the
# blast radius of a runaway tool is `<user>_agent`'s sandbox, not
# your home directory or your team's filesystem. In team setups
# this also gives the operator supervision without impersonation —
# see docs/explain/supervision-without-impersonation.md.
#
# This file ships in the SIMPLEST mode (agent runs as the caller),
# so it copies and runs without any extra OS setup. To switch to
# the recommended paired sandbox, read
# docs/scenarios/solo-1.md (or the relevant team
# section) and replace the active block with the snippet shown
# there. Scenario blocks below are commented out as starting points.
#
# Scenarios:
#   - Solo on a single host    (active default)
#   - Solo on multiple hosts   → add [[remote_hosts]] aggregation
#   - Team on a single host    → per-caller paired sandbox / shared sandbox
#   - Team on multiple hosts   → both
#
# Every key is documented in docs/reference/configuration.md.

default_launch_mode = "caller"
session_prefix      = "uxon-"

# Required only for `uxon new <name>` (project scaffolding). Leave
# both unset to use just `uxon run` and the TUI's "New session in
# current folder" — those gate on write access and accept any
# writable directory.
# allowed_roots    = ["~/projects"]
# new_project_root = "~/projects"

[agents]
enabled = ["claude"]
default = "claude"

[agents.claude]
default_args = []

# [agents.codex]
# default_args = []
#
# [agents.cursor]
# default_args = []


# ─── Solo on a single host (recommended: paired sandbox) ──────────
# docs/scenarios/solo-1.md
#
# One-time host setup:
#   sudo useradd -m -s /bin/bash vz_agent
#   echo 'vz ALL=(vz_agent) NOPASSWD: ALL' \
#     | sudo tee /etc/sudoers.d/uxon-vz-agent
#   sudo chmod 440 /etc/sudoers.d/uxon-vz-agent
#   sudo install -d -o vz_agent -g vz_agent /srv/projects
#
# Then replace the active "default_launch_mode = caller" line above
# with the block below:
#
# default_launch_mode = "fixed"
# runtime_user        = "vz_agent"
# session_users       = ["vz_agent"]
# allowed_roots       = ["/srv/projects"]
# new_project_root    = "/srv/projects"


# ─── Solo on multiple hosts ───────────────────────────────────────
# docs/scenarios/solo-n.md
#
# Each peer runs its own uxon install with its own paired-sandbox
# config. On the aggregator, add one block per peer. Auth, port,
# ProxyJump etc. live in ~/.ssh/config — uxon does not duplicate them.
#
# [[remote_hosts]]
# name        = "vz-prod1"
# ssh_alias   = "vz-prod1"
# description = "primary EU"   # optional, shown in TUI tooltips
# remote_uxon = "uxon"         # optional, default "uxon"


# ─── Team on a single host ────────────────────────────────────────
# docs/scenarios/team-1.md
#
# Pick ONE of (a) / (b) / (c) below.
#
# (a) Recommended: per-caller paired sandbox.
#     One <user>_agent per developer.
#
# default_launch_mode   = "fixed"
# runtime_user          = "team_agent"   # fallback for unmapped callers
# session_users         = ["alice_agent", "bob_agent", "carol_agent"]
# enable_all_users_list = true
# allowed_roots         = ["/srv/projects"]
# new_project_root      = "/srv/projects"
#
# [launch_user_by_caller]
# alice = "alice_agent"
# bob   = "bob_agent"
# carol = "carol_agent"
#
# (b) Shared sandbox user (one OS account for all agents).
#     Useful when the agent needs shared workspace/state across devs.
#
# default_launch_mode = "fixed"
# runtime_user        = "team_agent"
# session_users       = ["team_agent"]
# allowed_roots       = ["/srv/projects"]
# new_project_root    = "/srv/projects"
#
# (c) No sandbox: each developer's agent runs as the developer.
#     Simplest; agent inherits the caller's trust boundary.
#
# default_launch_mode   = "caller"
# session_users         = ["alice", "bob", "carol"]
# enable_all_users_list = true


# ─── Team on multiple hosts ───────────────────────────────────────
# docs/scenarios/team-n.md
#
# Combine the team-on-a-single-host keys above with [[remote_hosts]]
# blocks like in the solo-on-multiple-hosts section.


# ─── Dashboard columns + view (TUI) ───────────────────────────────
# docs/guides/customise/customise-dashboard.md
#
# Empty / absent ``columns`` uses the built-in registry defaults.
# Listing columns explicitly opts into a fixed visual order;
# unknown ids from older / newer uxon versions are silently
# dropped. The ``path`` and ``cmd`` columns are hidden by default
# — opt back in by listing them here.
#
# ``default_view`` picks the initial dashboard layout. ``flat``
# (default) is a single ranked list across the fleet; ``by_host``
# shows a per-host tab strip and status bar. Toggle at runtime
# with ``v``. (The legacy ``default_sort_by`` key is silently
# ignored — sort is a fixed contract, see configuration.md.)
#
# [tui.table]
# columns      = ["name", "user", "cpu", "ram", "last"]
# default_view = "flat"


# ─── Dashboard search bar (TUI) ───────────────────────────────────
# docs/reference/configuration.md#tuisearch-table
#
# The bar takes focus on TUI mount; press ``s`` (or ``/``) to refocus
# from anywhere, ``Esc`` to clear-and-blur. ``fields`` controls which
# row attributes the query matches against (allowed values:
# ``name``, ``user``, ``host``, ``path``, ``cmd``). Unknown entries
# fail loud at load.
#
# [tui.search]
# fields = ["name", "user"]


# ─── Block colours (TUI) ──────────────────────────────────────────
# docs/guides/customise/customise-dashboard.md
#
# Each remote host gets a hue applied to its tab, status-bar name
# token, and rows. Pin a hue per peer with
# ``[[remote_hosts]] color = "..."`` (overrides auto-cycle); otherwise
# the TUI cycles through ``tui.color_palette``. Local rows take
# ``local_host.color``.
#
# [tui]
# color_palette = ["cyan", "blue"]
#
# [local_host]
# color = "green"


# ─── SSH multiplexing ─────────────────────────────────────────────
# docs/reference/configuration.md (top-level keys)
#
# ``ssh_multiplex`` toggles ``ControlMaster=auto`` /
# ``ControlPath`` / ``ControlPersist`` on the default fetch template
# (warm tick: 5–20 ms vs cold 200–500 ms). Set ``"off"`` only in
# environments that prohibit ControlPersist sockets.
# ``ssh_control_persist_seconds`` is the master's lifetime; must be
# ``> 0``. To disable multiplexing entirely set
# ``ssh_multiplex = "off"`` rather than zeroing this out.
#
# ssh_multiplex                = "auto"
# ssh_control_persist_seconds  = 300


# ─── uxon-managed tmux options ────────────────────────────────────
# docs/reference/configuration.md ([tmux] managed options)
#
# OFF BY DEFAULT. When enabled, uxon layers the recommended set below
# (mouse support, OSC-52 passthrough, extended keys, terminal-features
# for agent TUIs) on top of whatever the launch user's own tmux config
# (/etc/tmux.conf, ~/.tmux.conf, XDG) provides, at launch, without
# editing anyone's files. The recommended tables ship built-in, so the
# block below is shown only so you can see what gets applied — to turn
# it on you only need ``manage_options = true`` (the scope tables are
# optional; uncomment them only to customise).
#
# The three tables map 1:1 to tmux scopes and are emitted in this fixed
# order: global (``set -g``) → server (``set -s``) → append-server
# (``set -as``). Within a table, declaration order is preserved. Values
# are passed to tmux VERBATIM (no validation): a bad option aborts the
# launch (fail-fast) — uxon never starts a session whose options failed.
#
# To enable, uncomment ``[tmux]`` with ``manage_options = true``. Override
# is per-scope: writing e.g. [tmux.options] replaces only that scope
# (re-list every global option you want); scopes you omit keep their
# recommended defaults.
#
# [tmux]
# manage_options = true
#
# [tmux.options]            # set -g
# mouse = "on"
# allow-passthrough = "on"
#
# [tmux.server_options]     # set -s
# extended-keys = "on"
#
# [tmux.append_server_options]   # set -as
# terminal-features = "xterm*:extkeys"
