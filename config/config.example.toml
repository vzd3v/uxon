runtime_user = "agent"
default_launch_mode = "fixed"
enable_all_users_list = false
session_prefix = "uxon-"
# Empty by default. If you upgraded from a previous prefix and still
# have running sessions under it, list it here (e.g. ["ccw-"]) so
# list/attach/kill see them. New installs leave this empty.
legacy_session_prefixes = []
allowed_roots = [
  "/srv/projects",
]
session_users = [
  "agent",
]
new_project_root = "/srv/projects"
repeat_noninteractive_mode = "fail"
tmux_socket_template = "/tmp/uxon-{user}.sock"

[agents]
enabled = [
  "claude",
]
default = "claude"

[agents.claude]
default_args = [
]

[agents.codex]
default_args = [
]

[agents.cursor]
default_args = [
]

[launch_user_by_caller]
